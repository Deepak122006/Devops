# ============================================================
# application.properties — Spring Boot Config
# ============================================================

# Server
server.port=8080
spring.application.name=devsecops-app

# Actuator — expose health, info, metrics, prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.metrics.export.prometheus.enabled=true

# App info (shown at /actuator/info)
info.app.name=DevSecOps Demo App
info.app.version=1.0.0
info.app.description=Spring Boot app in a DevSecOps pipeline

# Logging
logging.level.root=INFO
logging.level.com.antigravity=DEBUG

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=NON_NULL
