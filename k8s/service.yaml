apiVersion: v1
kind: Service
metadata:
  name: devsecops-app-svc
  namespace: devsecops
  labels:
    app: devsecops-app
  annotations:
    # Expose /actuator/prometheus to Prometheus scraper
    prometheus.io/scrape: "true"
    prometheus.io/port:   "8080"
spec:
  type: ClusterIP   # Ingress handles external access; service is cluster-internal
  selector:
    app: devsecops-app
  ports:
    - name:       http
      port:       80
      targetPort: 8080
      protocol:   TCP
