# ============================================================
# ingress.yaml — AWS ALB Ingress for DevSecOps App
# WHY: Uses AWS Load Balancer Controller (ALB Ingress Controller)
#      to provision a real AWS Application Load Balancer.
# Pre-req: AWS Load Balancer Controller must be installed on EKS.
#   helm install aws-load-balancer-controller \
#     eks/aws-load-balancer-controller \
#     -n kube-system \
#     --set clusterName=devsecops-eks
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devsecops-app-ingress
  namespace: devsecops
  labels:
    app: devsecops-app
  annotations:
    kubernetes.io/ingress.class:                    alb
    alb.ingress.kubernetes.io/scheme:               internet-facing
    alb.ingress.kubernetes.io/target-type:          ip
    alb.ingress.kubernetes.io/listen-ports:         '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path:     /actuator/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthy-threshold-count:      "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count:    "3"
spec:
  rules:
    - http:
        paths:
          - path:     /
            pathType: Prefix
            backend:
              service:
                name: devsecops-app-svc
                port:
                  number: 80
