# ============================================================
# hpa.yaml — Horizontal Pod Autoscaler
# WHY: Automatically scales pod replicas based on CPU/memory load.
#      Min 2 pods for HA, max 10 for burst traffic.
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devsecops-app-hpa
  namespace: devsecops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devsecops-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    # Scale when CPU > 70%
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 70
    # Scale when Memory > 80%
    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type:          Pods
          value:         2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5 min before scaling down
      policies:
        - type:          Pods
          value:         1
          periodSeconds: 120
