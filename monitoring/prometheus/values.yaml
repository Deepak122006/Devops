# ============================================================
# Prometheus Helm Values — kube-prometheus-stack
# Customized for DevSecOps app scraping
# ============================================================

# ── Grafana ──────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: "Grafana@2024!"   # Override with --set in helm install

  service:
    type: ClusterIP

  # Sidecar to auto-load dashboards from ConfigMaps
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard

  # Install Grafana plugins
  plugins:
    - grafana-piechart-panel
    - grafana-clock-panel

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana/"
    auth.anonymous:
      enabled: false

# ── Prometheus ───────────────────────────────────────────────
prometheus:
  enabled: true

  prometheusSpec:
    retention: 15d
    retentionSize: "10GB"

    resources:
      requests:
        memory: "512Mi"
        cpu:    "250m"
      limits:
        memory: "2Gi"
        cpu:    "1"

    # WHY: Scrape all namespaces, not just monitoring
    podMonitorNamespaceSelector: {}
    serviceMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}

    # Additional scrape configs for Spring Boot Actuator
    additionalScrapeConfigs:
      - job_name: 'devsecops-app'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - devsecops
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action:        keep
            regex:         "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action:        replace
            target_label:  __metrics_path__
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action:        replace
            regex:         "([^:]+)(?::\\d+)?;(\\d+)"
            replacement:   "$1:$2"
            target_label:  __address__

# ── AlertManager ─────────────────────────────────────────────
alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    receivers:
      - name: 'null'
      - name: slack
        slack_configs:
          - channel: '#devops-alerts'
            send_resolved: true
            title: '{{ template "slack.default.title" . }}'
            text:  '{{ template "slack.default.text" . }}'
    route:
      group_by:       ['alertname', 'namespace']
      group_wait:     30s
      group_interval: 5m
      repeat_interval: 12h
      receiver:       'null'
      routes:
        - match:
            severity: critical
          receiver: slack

# ── Node Exporter ────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── kube-state-metrics ───────────────────────────────────────
kubeStateMetrics:
  enabled: true
