# sonar-project.properties
# ============================================================
# SonarQube project configuration for the Spring Boot app
# WHY: Provides scanner with coverage and source path details.
# Usage: mvn sonar:sonar (reads these from classpath)
# ============================================================

sonar.projectKey=devsecops-app
sonar.projectName=DevSecOps App
sonar.projectVersion=1.0.0
sonar.language=java
sonar.sources=src/main/java
sonar.tests=src/test/java

# JaCoCo coverage report path
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.java.coveragePlugin=jacoco
sonar.dynamicAnalysis=reuseReports

# Compiled classes
sonar.java.binaries=target/classes

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions — don't scan generated code
sonar.exclusions=**/generated/**,**/target/**,**/*.xml
sonar.test.exclusions=**/test/**

# Quality Gate — fail build if gate fails
# WHY: This is configured server-side in SonarQube UI
# but documented here for reference
